name: HLC EPC Ihale Radari

on:
  schedule:
    # Türkiye saati 08:30 için (UTC 05:30)
    - cron: '30 5 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Klonla
        uses: actions/checkout@v4 # v4 daha günceldir

      - name: Python 3.10 Kurulumu
        uses: actions/setup-python@v5 # v5 daha günceldir
        with:
          python-version: '3.10'
          cache: 'pip' # Kütüphaneleri önbelleğe alarak hızlandırır

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: HLC EPC Botunu Çalıştır
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: python main.py

      - name: Bot Hafızasını Kaydet
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          # database.txt yazarsan hafıza güncellenmez.
          git add database.txt
          git commit -m "🤖 Hafıza güncellendi: $(date +'%Y-%m-%d %H:%M')" || echo "Yeni ihale yok, kayıt atlandı."
          git push
